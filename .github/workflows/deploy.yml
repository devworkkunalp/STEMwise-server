name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    # Paths are now relative to this backend repository
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build STEMwise.slnx --configuration Release

      - name: dotnet publish
        run: dotnet publish STEMwise.API/STEMwise.API.csproj -c Release -o ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smtpwise-app-service'
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ./publish
